name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: george-koufie-portfolio
  CONTAINER_NAME: portfolio

jobs:

  # ── Job: Validate ─────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:test .

      - name: Validate nginx config
        run: docker run --rm $IMAGE_NAME:test nginx -t

  # ── Job: Build & Deploy ───────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.run_number }} .
          docker tag $IMAGE_NAME:${{ github.run_number }} $IMAGE_NAME:latest
          echo "Image built: $IMAGE_NAME:${{ github.run_number }}"

      - name: Verify EC2 reachability
        env:
          SERVER: ${{ secrets.PORTFOLIO_SERVER_IP }}
        run: |
          echo "Checking connectivity to $SERVER:22..."
          if ! nc -zw 5 $SERVER 22; then
            echo "ERROR: Cannot reach $SERVER on port 22."
            echo "Check: 1) EC2 instance is running  2) Security Group allows port 22  3) PORTFOLIO_SERVER_IP secret is correct"
            exit 1
          fi
          echo "Port 22 is reachable."

      - name: Configure SSH known hosts
        env:
          SERVER_FINGERPRINT: ${{ secrets.PORTFOLIO_SERVER_FINGERPRINT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_FINGERPRINT" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PORTFOLIO_SSH_KEY }}
          SERVER: ${{ secrets.PORTFOLIO_SERVER_IP }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

          docker save $IMAGE_NAME:latest | gzip > portfolio-image.tar.gz

          scp -i /tmp/deploy_key.pem \
              portfolio-image.tar.gz \
              ubuntu@$SERVER:~/portfolio-image.tar.gz

          ssh -i /tmp/deploy_key.pem \
              ubuntu@$SERVER "
                docker load < ~/portfolio-image.tar.gz
                docker rm -f $CONTAINER_NAME 2>/dev/null || true
                docker run -d \
                    -p 80:80 \
                    --name $CONTAINER_NAME \
                    --restart always \
                    $IMAGE_NAME:latest
                rm -f ~/portfolio-image.tar.gz
                echo 'Container running:'
                docker ps | grep $CONTAINER_NAME
              "

      - name: Cleanup sensitive files
        if: always()
        run: rm -f portfolio-image.tar.gz /tmp/deploy_key.pem

      - name: Health Check
        env:
          SERVER: ${{ secrets.PORTFOLIO_SERVER_IP }}
        run: |
          for i in $(seq 1 10); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$SERVER)
            echo "Attempt $i — HTTP Status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check PASSED"
              exit 0
            fi
            sleep 3
          done
          echo "Health check FAILED after 10 attempts"
          exit 1
