# ─── SonarQube Project Configuration ───────────────────────
sonar.projectKey=george-koufie-portfolio
sonar.projectName=George Koufie Portfolio
sonar.projectVersion=1.0

# Source files to scan
sonar.sources=.

# Exclude files that don't need scanning
sonar.exclusions=**/node_modules/**,**/assets/fonts/**,resume/**,scripts/**

# Include specific file types
sonar.inclusions=**/*.html,**/*.css,**/*.js

# Encoding
sonar.sourceEncoding=UTF-8

# SonarQube server (Jenkins will override this)
sonar.host.url=http://sonarqube:9000